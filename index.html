<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>DODGE.EXE</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#06080f;touch-action:none;user-select:none;-webkit-user-select:none;}
canvas{display:block;position:absolute;top:0;left:0;}
#ui{position:absolute;inset:0;pointer-events:none;font-family:'Press Start 2P',monospace;}
#hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:12px 16px;gap:8px;}
.hb{display:flex;flex-direction:column;gap:4px;}
.hl{font-size:7px;color:#ffffff44;letter-spacing:2px;}
.hv{font-size:16px;color:#00ffee;line-height:1;}
#wv{color:#ffcc00;}
#skillBtn{position:absolute;bottom:14px;right:14px;pointer-events:all;font-family:'Press Start 2P',monospace;font-size:8px;padding:10px 14px;background:#06080f;border:2px solid #00ffee;color:#00ffee;cursor:pointer;}
#skillBtn:active{background:#001a1a;}
#spTxt{color:#ffcc00;font-size:7px;display:block;margin-top:4px;text-align:center;}
#novaBar{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);width:160px;display:none;}
#novaFill{height:10px;background:#ff6633;}
#novaBg{background:#111;border:2px solid #ff6633;padding:1px;}
#novaLbl{font-size:6px;color:#ff6633;text-align:center;margin-top:3px;letter-spacing:2px;font-family:'Press Start 2P',monospace;}

#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#06080f;font-family:'Press Start 2P',monospace;gap:18px;}
#overlay.hidden{display:none;}
#ovTitle{font-size:40px;color:#ff2244;letter-spacing:4px;}
#ovSub{font-size:8px;color:#ffffff44;letter-spacing:3px;}
#ovScore,#ovBest,#ovSP{display:none;}
#ovScore{font-size:12px;color:#ffcc00;}
#ovBest{font-size:10px;color:#00ffee;}
#ovSP{font-size:9px;color:#ffcc0099;}
#ovBlink{font-size:11px;color:#00ffee;animation:blink 1s step-end infinite;letter-spacing:2px;}
@keyframes blink{50%{opacity:0}}
#ovSkills{font-size:8px;color:#00ffee88;cursor:pointer;pointer-events:all;padding:8px;border:1px solid #00ffee44;}
#ovSkills:active{background:#001a1a;}

/* SKILL TREE */
#sto{position:absolute;inset:0;display:none;flex-direction:column;background:#06080f;z-index:50;border:3px solid #00ffee;}
#sth{display:flex;align-items:center;padding:10px 14px;gap:14px;background:#060e18;border-bottom:3px solid #0a2030;flex-shrink:0;}
#sth-title{font-family:'Press Start 2P',monospace;font-size:11px;color:#00ffee;}
#sth-sp{font-family:'Press Start 2P',monospace;font-size:10px;color:#ffcc00;flex:1;}
#sth-hint{font-family:'Press Start 2P',monospace;font-size:6px;color:#ffffff33;flex:1;text-align:center;}
#sth-close{font-family:'Press Start 2P',monospace;font-size:9px;padding:8px 12px;background:#06080f;border:2px solid #cc2200;color:#ff4444;cursor:pointer;}
#stb{flex:1;overflow:hidden;position:relative;}
#stc{position:absolute;inset:0;width:100%;height:100%;}
#np{display:none;flex-shrink:0;background:#060e18;border-top:3px solid #0a2030;padding:12px 16px;gap:14px;align-items:center;font-family:'Press Start 2P',monospace;}
#np-name{font-size:11px;margin-bottom:6px;}
#np-desc{font-size:7px;color:#aaa;line-height:1.9;white-space:pre-line;}
#np-cost{font-size:8px;color:#ffcc00;margin-top:6px;}
#np-buy{font-family:'Press Start 2P',monospace;font-size:9px;padding:10px 12px;background:#051a10;border:2px solid #22cc44;color:#44ff88;cursor:pointer;flex-shrink:0;white-space:nowrap;}
#np-buy:disabled{background:#0a0a0a;border-color:#222;color:#333;cursor:default;}
#np-buy.owned{background:#001228;border-color:#0066cc;color:#44aaff;cursor:default;}
</style>
</head>
<body>
<canvas id="gc"></canvas>
<div id="ui">
  <div id="hud">
    <div class="hb"><div class="hl">SCORE</div><div class="hv" id="sc">0000000</div></div>
    <div class="hb" style="align-items:center"><div class="hl">WAVE</div><div class="hv" id="wv">01</div></div>
    <div class="hb" style="align-items:flex-end"><div class="hl">LIVES</div><div class="hv" id="lv">♥♥♥</div></div>
  </div>
  <div id="novaBar"><div id="novaBg"><div id="novaFill" style="width:0%"></div></div><div id="novaLbl">NOVA</div></div>
  <button id="skillBtn">SKILLS<span id="spTxt">SP: 0</span></button>
</div>

<div id="overlay">
  <div id="ovTitle">DODGE</div>
  <div id="ovSub">.EXE  —  GUNFIRE EVASION</div>
  <div id="ovScore"></div>
  <div id="ovBest"></div>
  <div id="ovSP"></div>
  <div id="ovBlink">▶  TAP TO PLAY  ◀</div>
  <div id="ovSkills" onclick="openST()">⚡ SKILL TREE</div>
</div>

<div id="sto">
  <div id="sth">
    <div id="sth-title">⚡ SKILL TREE</div>
    <div id="sth-sp">SP: 0</div>
    <div id="sth-hint">DRAG TO EXPLORE • TAP NODE TO SELECT</div>
    <button id="sth-close" onclick="closeST()">✕ CLOSE</button>
  </div>
  <div id="stb"><canvas id="stc"></canvas></div>
  <div id="np" style="display:flex">
    <div style="flex:1"><div id="np-name"></div><div id="np-desc"></div><div id="np-cost"></div></div>
    <button id="np-buy" onclick="buySelected()">UNLOCK</button>
  </div>
</div>

<script>
'use strict';
const TAU=Math.PI*2;
const lerp=(a,b,t)=>a+(b-a)*t;
const rnd=(a,b)=>a+Math.random()*(b-a);
const rndI=(a,b)=>(a+Math.random()*(b-a))|0;

// ── SAVE ──────────────────────────────────────────────────────
let spBank=0,hiScore=0,unlocked=new Set(['root']);
function loadSave(){try{const d=JSON.parse(localStorage.getItem('dex4')||'{}');spBank=d.sp||0;hiScore=d.hi||0;unlocked=new Set(d.ul||['root']);}catch(e){}}
function doSave(){localStorage.setItem('dex4',JSON.stringify({sp:spBank,hi:hiScore,ul:[...unlocked]}));}

// ── SKILLS ────────────────────────────────────────────────────
const BC={root:'#ffffff',move:'#00ffee',def:'#44ff88',pwr:'#ff6633',luck:'#ffcc00'};
const SKILLS=[
  {id:'root', name:'START',       desc:'Your journey begins.',          b:'root',t:0,vx:1400,vy:900, cost:0,req:[]},
  {id:'sp1',  name:'SWIFT I',     desc:'+30% move speed',               b:'move',t:1,vx:1050,vy:900, cost:1,req:['root']},
  {id:'sp2',  name:'SWIFT II',    desc:'+60% move speed',               b:'move',t:2,vx:760, vy:775, cost:2,req:['sp1']},
  {id:'sp3',  name:'SWIFT III',   desc:'+120% move speed',              b:'move',t:3,vx:510, vy:695, cost:3,req:['sp2']},
  {id:'ltspd',name:'LIGHTSPEED',  desc:'+240% speed\nFire trail',       b:'move',t:4,vx:260, vy:820, cost:5,req:['sp3','dash']},
  {id:'aftim',name:'AFTERIMAGE',  desc:'Trail kills\nbullets',          b:'move',t:2,vx:760, vy:1025,cost:2,req:['sp1']},
  {id:'dash', name:'DASH',        desc:'Double-tap to\nburst forward',  b:'move',t:3,vx:510, vy:900, cost:3,req:['sp2']},
  {id:'ghost',name:'GHOST',       desc:'Phase through\nbullets on hit', b:'move',t:3,vx:510, vy:1105,cost:3,req:['aftim']},
  {id:'lf1',  name:'TOUGH I',     desc:'+1 max life',                   b:'def', t:1,vx:1260,vy:595, cost:2,req:['root']},
  {id:'lf2',  name:'TOUGH II',    desc:'+1 max life',                   b:'def', t:2,vx:1060,vy:415, cost:3,req:['lf1']},
  {id:'lf3',  name:'JUGGERNAUT',  desc:'+2 max lives',                  b:'def', t:3,vx:870, vy:265, cost:5,req:['lf2']},
  {id:'inv1', name:'NIMBLE',      desc:'+60% iframes',                  b:'def', t:2,vx:1470,vy:415, cost:2,req:['lf1']},
  {id:'inv2', name:'UNTOUCHABLE', desc:'2x iframes',                    b:'def', t:3,vx:1680,vy:265, cost:4,req:['inv1']},
  {id:'shld', name:'SHIELD',      desc:'Absorbs one\nhit per life',     b:'def', t:2,vx:1260,vy:250, cost:3,req:['lf1','inv1']},
  {id:'aegis',name:'AEGIS',       desc:'Shield\nregens over time',      b:'def', t:4,vx:1260,vy:100, cost:6,req:['shld','lf2']},
  {id:'tslow',name:'BULLET TIME', desc:'Slow bullets\nnear you',        b:'pwr', t:1,vx:1750,vy:900, cost:2,req:['root']},
  {id:'rep',  name:'REPULSOR',    desc:'Push bullets\naway',            b:'pwr', t:2,vx:2000,vy:775, cost:3,req:['tslow']},
  {id:'nova', name:'NOVA PULSE',  desc:'Triple-tap:\nclear all',        b:'pwr', t:2,vx:2000,vy:1025,cost:3,req:['tslow']},
  {id:'bhole',name:'BLACK HOLE',  desc:'Pull then\nexplode bullets',    b:'pwr', t:3,vx:2250,vy:695, cost:4,req:['rep']},
  {id:'magn', name:'MAGNETISM',   desc:'Destroy close\nbullets',        b:'pwr', t:3,vx:2250,vy:1060,cost:4,req:['rep','nova']},
  {id:'ovrch',name:'OVERCHARGE',  desc:'Periodic burst\nof invincibility',b:'pwr',t:4,vx:2500,vy:870,cost:6,req:['bhole','magn']},
  {id:'sc1',  name:'KEEN EYE',    desc:'+25% score',                    b:'luck',t:1,vx:1560,vy:1205,cost:1,req:['root']},
  {id:'sc2',  name:'FOCUSED',     desc:'+50% score',                    b:'luck',t:2,vx:1710,vy:1395,cost:2,req:['sc1']},
  {id:'sc3',  name:'HIGH SCORER', desc:'+100% score',                   b:'luck',t:3,vx:1910,vy:1565,cost:4,req:['sc2']},
  {id:'sw1',  name:'WISDOM',      desc:'+1 SP\nper wave',               b:'luck',t:2,vx:1370,vy:1395,cost:2,req:['sc1']},
  {id:'sw2',  name:'ENLIGHTENED', desc:'2x SP gain',                    b:'luck',t:3,vx:1170,vy:1565,cost:4,req:['sw1']},
  {id:'nmiss',name:'THRILL SEEK', desc:'Near misses\naward bonus SP',   b:'luck',t:3,vx:1540,vy:1575,cost:3,req:['sc2','sw1']},
  {id:'jkpot',name:'JACKPOT!',    desc:'Random SP\nbonuses in-game',    b:'luck',t:4,vx:1540,vy:1765,cost:6,req:['nmiss','sc3','sw2']},
];
const SKMAP={};for(const s of SKILLS)SKMAP[s.id]=s;

// ── MODS ──────────────────────────────────────────────────────
let M={};
function recalc(){
  M={spdM:1,maxHP:3,invF:90,scM:1,spM:1,spWave:0,
     shield:false,dash:false,tslow:false,nova:false,rep:false,
     aftim:false,nmiss:false,bhole:false,magn:false,
     ovrch:false,aegis:false,jkpot:false,ghost:false,lts:false};
  for(const id of unlocked)switch(id){
    case'sp1':   M.spdM+=.30;break; case'sp2':   M.spdM+=.60;break;
    case'sp3':   M.spdM+=1.2;break; case'ltspd': M.spdM+=2.4;M.lts=true;break;
    case'aftim': M.aftim=true;break; case'dash':  M.dash=true;break;
    case'ghost': M.ghost=true;break;
    case'lf1':   M.maxHP++;break; case'lf2': M.maxHP++;break; case'lf3': M.maxHP+=2;break;
    case'inv1':  M.invF=Math.round(M.invF*1.6);break; case'inv2': M.invF=Math.round(M.invF*2);break;
    case'shld':  M.shield=true;break; case'aegis': M.shield=true;M.aegis=true;break;
    case'tslow': M.tslow=true;break; case'rep':   M.rep=true;break;
    case'nova':  M.nova=true;break;  case'bhole': M.bhole=true;break;
    case'magn':  M.magn=true;break;  case'ovrch': M.ovrch=true;break;
    case'sc1':   M.scM+=.25;break;   case'sc2':   M.scM+=.50;break; case'sc3': M.scM+=1;break;
    case'sw1':   M.spWave+=1;break;  case'sw2':   M.spM*=2;break;
    case'nmiss': M.nmiss=true;break; case'jkpot': M.jkpot=true;break;
  }
}

// ── CANVAS ───────────────────────────────────────────────────
const gc=document.getElementById('gc');
const ctx=gc.getContext('2d',{alpha:false});
let W=0,H=0;
function resize(){W=gc.width=window.innerWidth;H=gc.height=window.innerHeight;buildBG();}

// ── BACKGROUND (pre-rendered, redrawn only on resize/wave) ───
let bgCanvas=document.createElement('canvas');
let bgCtx=bgCanvas.getContext('2d');
function buildBG(){
  bgCanvas.width=W;bgCanvas.height=H;
  bgCtx.fillStyle='#06080f';bgCtx.fillRect(0,0,W,H);
  const hue=180+wave*8;
  bgCtx.fillStyle=`hsla(${hue},80%,50%,.025)`;
  const gs=32;
  for(let x=0;x<W;x+=gs)bgCtx.fillRect(x,0,1,H);
  for(let y=0;y<H;y+=gs)bgCtx.fillRect(0,y,W,1);
}
resize();
window.addEventListener('resize',resize);

// ── GAME STATE ───────────────────────────────────────────────
let state='menu';
let score=0,wave=1,hp=3,maxHP=3;
let frame=0,invCD=0,shakeX=0,shakeY=0;
let spEarned=0,novaCd=0;
const NOVA_MAX=480;
let shield=false,shieldRegen=0,overchargeTimer=0,ghostTimer=0;
let dashCD=0,dashActive=0,tapCount=0,lastTapT=0,touching=false;

// ── PLAYER ───────────────────────────────────────────────────
const P={x:0,y:0,tx:0,ty:0,r:16};
const TM=20;
const trX=new Float32Array(TM),trY=new Float32Array(TM);
let trLen=0,trHead=0;

// ── BULLETS (typed arrays for perf) ─────────────────────────
const BMAX=300;
const bX=new Float32Array(BMAX),bY=new Float32Array(BMAX);
const bVX=new Float32Array(BMAX),bVY=new Float32Array(BMAX);
const bR=new Float32Array(BMAX),bAct=new Uint8Array(BMAX);
const bType=new Uint8Array(BMAX),bCol=new Uint8Array(BMAX);
let bCount=0,bNext=0;
const BCOLS=['#ff2244','#ff5533','#ffcc00','#ff33cc','#ff4400','#ff8800','#ff0055'];

// ── PARTICLES (typed arrays) ─────────────────────────────────
const PMAX=400;
const pX=new Float32Array(PMAX),pY=new Float32Array(PMAX);
const pVX=new Float32Array(PMAX),pVY=new Float32Array(PMAX);
const pL=new Float32Array(PMAX),pD=new Float32Array(PMAX),pS=new Float32Array(PMAX);
const pC=new Uint8Array(PMAX);
let pH=0;

function addP(x,y,vx,vy,sz,c,d){pX[pH]=x;pY[pH]=y;pVX[pH]=vx;pVY[pH]=vy;pS[pH]=sz;pC[pH]=c;pL[pH]=1;pD[pH]=d;pH=(pH+1)%PMAX;}
function burst(x,y,ci,n,fast){for(let i=0;i<n;i++){const a=Math.random()*TAU,sp=fast?rnd(2.5,9):rnd(.5,4);addP(x,y,Math.cos(a)*sp,Math.sin(a)*sp,rnd(2,6),ci,rnd(.025,.055));}}

// ── FLOATS ───────────────────────────────────────────────────
let floats=[];
function floatText(x,y,t,c){floats.push({x,y,t,c,l:1,vy:-1.5});}

function earnSP(n){
  const a=Math.max(1,Math.round(n*M.spM));
  spBank+=a;spEarned+=a;doSave();
  floatText(P.x,P.y-52,'+'+a+' SP','#ffcc00');
  updSP();
}
function updSP(){
  document.getElementById('spTxt').textContent='SP: '+spBank;
  document.getElementById('sth-sp').textContent='SP: '+spBank;
}

// ── BULLET SPAWN ─────────────────────────────────────────────
function spawnBullet(){
  let slot=-1;
  for(let i=0;i<BMAX;i++){const j=(bNext+i)%BMAX;if(!bAct[j]){slot=j;break;}}
  if(slot<0)return;
  bNext=(slot+1)%BMAX;
  const side=rndI(0,4);
  let sx,sy;
  if(side===0){sx=rnd(-20,-5);sy=rnd(0,H);}
  else if(side===1){sx=rnd(W+5,W+20);sy=rnd(0,H);}
  else if(side===2){sx=rnd(0,W);sy=rnd(-20,-5);}
  else{sx=rnd(0,W);sy=rnd(H+5,H+20);}
  const spd=3+wave*.4+Math.random()*1.6;
  const ang=Math.atan2(P.y-sy,P.x-sx)+(Math.random()-.5)*.24;
  bX[slot]=sx;bY[slot]=sy;
  bVX[slot]=Math.cos(ang)*spd;bVY[slot]=Math.sin(ang)*spd;
  bR[slot]=6+Math.random()*3;
  bType[slot]=wave<3?0:[0,0,1,2][rndI(0,4)];
  bCol[slot]=rndI(0,BCOLS.length);
  bAct[slot]=1;bCount++;
}
function killB(i){if(bAct[i]){bAct[i]=0;bCount--;}}

// ── HUD ──────────────────────────────────────────────────────
function updHUD(){
  document.getElementById('sc').textContent=String(score).padStart(7,'0');
  document.getElementById('wv').textContent=String(wave).padStart(2,'0');
  let lstr='';for(let i=0;i<maxHP;i++)lstr+=(i<hp)?'♥':'♡';
  document.getElementById('lv').textContent=lstr;
  const nb=document.getElementById('novaBar');
  if(M.nova){nb.style.display='block';document.getElementById('novaFill').style.width=Math.round((1-novaCd/NOVA_MAX)*100)+'%';}
  else nb.style.display='none';
}

// ── GAME INIT / OVER ─────────────────────────────────────────
function startGame(){
  loadSave();recalc();
  score=0;wave=1;hp=M.maxHP;maxHP=M.maxHP;
  frame=0;invCD=0;novaCd=0;spEarned=0;
  shakeX=0;shakeY=0;shield=M.shield;shieldRegen=0;
  overchargeTimer=0;ghostTimer=0;dashCD=0;dashActive=0;
  tapCount=0;lastTapT=0;touching=false;floats=[];
  bAct.fill(0);bCount=0;bNext=0;
  pL.fill(0);pH=0;
  trLen=0;trHead=0;
  P.x=W/2;P.y=H/2;P.tx=W/2;P.ty=H/2;
  buildBG();state='play';
  document.getElementById('overlay').classList.add('hidden');
  updHUD();updSP();
}

function gameOver(){
  state='dead';
  if(score>hiScore){hiScore=score;doSave();}
  const earned=Math.max(1,Math.floor(wave*.5+spEarned));
  spBank+=earned;doSave();
  const ov=document.getElementById('overlay');
  ov.classList.remove('hidden');
  document.getElementById('ovTitle').textContent='GAME OVER';
  document.getElementById('ovSub').textContent='YOU WERE ELIMINATED';
  document.getElementById('ovScore').style.display='block';
  document.getElementById('ovScore').textContent='SCORE  '+String(score).padStart(7,'0');
  document.getElementById('ovBest').style.display='block';
  document.getElementById('ovBest').textContent='BEST   '+String(hiScore).padStart(7,'0');
  document.getElementById('ovSP').style.display='block';
  document.getElementById('ovSP').textContent='SP EARNED: +'+earned;
  document.getElementById('ovBlink').textContent='▶  TAP TO CONTINUE  ◀';
  updSP();
}

function showMenu(){
  const ov=document.getElementById('overlay');
  ov.classList.remove('hidden');
  document.getElementById('ovTitle').textContent='DODGE';
  document.getElementById('ovSub').textContent='.EXE  —  GUNFIRE EVASION';
  document.getElementById('ovScore').style.display='none';
  document.getElementById('ovBest').style.display='none';
  document.getElementById('ovSP').style.display='none';
  document.getElementById('ovBlink').textContent='▶  TAP TO PLAY  ◀';
  updSP();
}

// ── INPUT ────────────────────────────────────────────────────
function triggerNova(){
  novaCd=NOVA_MAX;
  for(let i=0;i<BMAX;i++)if(bAct[i]){burst(bX[i],bY[i],bCol[i],5,true);killB(i);}
  burst(P.x,P.y,0,20,true);shakeX=18;shakeY=18;
  floatText(P.x,P.y-60,'NOVA PULSE!','#ff6633');
}

gc.addEventListener('pointerdown',e=>{
  if(state==='menu'){startGame();return;}
  if(state==='dead'){state='menu';frame=0;showMenu();return;}
  if(state!=='play')return;
  const bx2=W-120,by2=H-58;
  if(e.clientX>bx2&&e.clientY>by2){openST();return;}
  touching=true;P.tx=e.clientX;P.ty=e.clientY;
  const now=Date.now();
  tapCount=(now-lastTapT<350)?tapCount+1:1;lastTapT=now;
  if(tapCount>=3&&M.nova&&novaCd<=0){triggerNova();tapCount=0;return;}
  if(tapCount===2&&M.dash&&dashCD<=0){dashActive=16;dashCD=50;burst(P.x,P.y,0,5,false);tapCount=0;}
},{passive:true});
gc.addEventListener('pointermove',e=>{if(touching&&state==='play'){P.tx=e.clientX;P.ty=e.clientY;}},{passive:true});
gc.addEventListener('pointerup',()=>{touching=false;},{passive:true});
gc.addEventListener('pointercancel',()=>{touching=false;},{passive:true});

// ── FIXED TIMESTEP LOOP ───────────────────────────────────────
let lastT=0,accum=0;
const STEP=1000/60;

function tick(){
  frame++;
  // Wave
  if(frame%660===0){
    wave++;earnSP(1+M.spWave);
    floatText(W/2,H*.38,'WAVE '+wave,'#ffcc00');
    shakeX=10;buildBG();updHUD();
  }
  // Score
  if(frame%20===0){score+=Math.round(wave*M.scM);updHUD();}
  // Jackpot
  if(M.jkpot&&frame%1800===0){const b=rndI(1,4);earnSP(b);floatText(P.x,P.y-70,'JACKPOT +'+b+' SP!','#ffcc00');}
  // Cooldowns
  if(novaCd>0)novaCd--;
  if(dashActive>0)dashActive--;if(dashCD>0)dashCD--;
  if(ghostTimer>0)ghostTimer--;
  if(invCD>0)invCD--;
  // Overcharge
  if(M.ovrch){overchargeTimer++;if(overchargeTimer>=1800){overchargeTimer=0;invCD=Math.max(invCD,180);burst(P.x,P.y,4,15,true);floatText(P.x,P.y-60,'OVERCHARGE!','#ff6633');}}
  // Aegis
  if(M.aegis&&!shield){shieldRegen++;if(shieldRegen>=500){shield=true;shieldRegen=0;floatText(P.x,P.y-45,'SHIELD REGEN','#8844ff');}}
  // Player move
  const spd=.13*M.spdM*(dashActive>0?2.6:1);
  P.x=lerp(P.x,P.tx,spd);P.y=lerp(P.y,P.ty,spd);
  trX[trHead]=P.x;trY[trHead]=P.y;
  trHead=(trHead+1)%TM;if(trLen<TM)trLen++;
  // Afterimage kill
  if((M.aftim||M.lts)&&trLen>5){
    const ti=(trHead-6+TM)%TM;
    const tx=trX[ti],ty=trY[ti];
    for(let i=0;i<BMAX;i++){if(!bAct[i])continue;if(Math.hypot(bX[i]-tx,bY[i]-ty)<26){burst(bX[i],bY[i],bCol[i],4,false);killB(i);}}
  }
  // Spawn
  const si=Math.max(8,50-wave*3);
  if(frame%si===0)spawnBullet();
  if(wave>=4&&frame%120===0){spawnBullet();spawnBullet();}
  if(wave>=8&&frame%90===0)spawnBullet();
  // Shake decay
  if(shakeX>.3)shakeX*=.8;else shakeX=0;
  if(shakeY>.3)shakeY*=.8;else shakeY=0;
  // Bullets
  for(let i=0;i<BMAX;i++){
    if(!bAct[i])continue;
    let sf=1;
    if(M.tslow&&Math.hypot(bX[i]-P.x,bY[i]-P.y)<160)sf=.45;
    if(M.rep){const dx=bX[i]-P.x,dy=bY[i]-P.y,d=Math.hypot(dx,dy);if(d<130&&d>.1){bVX[i]+=(dx/d)*.65;bVY[i]+=(dy/d)*.65;}}
    if(M.magn){const dx=bX[i]-P.x,dy=bY[i]-P.y,d=Math.hypot(dx,dy);if(d<200&&d>38){bVX[i]-=(dx/d)*.8;bVY[i]-=(dy/d)*.8;}else if(d<=38){burst(bX[i],bY[i],bCol[i],5,false);killB(i);continue;}}
    bX[i]+=bVX[i]*sf;bY[i]+=bVY[i]*sf;
    if(bX[i]<-70||bX[i]>W+70||bY[i]<-70||bY[i]>H+70){killB(i);continue;}
    if(invCD===0&&ghostTimer===0){
      const d=Math.hypot(P.x-bX[i],P.y-bY[i]);
      if(d<P.r+bR[i]-3){
        if(shield){shield=false;shieldRegen=0;burst(bX[i],bY[i],5,10,true);shakeX=12;floatText(P.x,P.y-50,'SHIELD BREAK!','#8844ff');killB(i);continue;}
        burst(P.x,P.y,0,12,true);burst(bX[i],bY[i],bCol[i],8,true);
        shakeX=18;shakeY=18;invCD=M.invF;ghostTimer=M.ghost?90:0;hp--;updHUD();killB(i);
        if(hp<=0){gameOver();return;}
        continue;
      }
      if(M.nmiss&&d<P.r+bR[i]+24&&Math.random()<.04)earnSP(1);
    }
  }
  // Particles
  for(let i=0;i<PMAX;i++){if(pL[i]<=0)continue;pX[i]+=pVX[i];pY[i]+=pVY[i];pVX[i]*=.92;pVY[i]*=.92;pL[i]-=pD[i];}
  // Floats
  for(let i=floats.length-1;i>=0;i--){const f=floats[i];f.y+=f.vy;f.l-=.018;if(f.l<=0)floats.splice(i,1);}
}

// ── RENDER ───────────────────────────────────────────────────
function render(){
  const sx=shakeX>0?(Math.random()-.5)*shakeX:0;
  const sy=shakeY>0?(Math.random()-.5)*shakeY:0;
  ctx.drawImage(bgCanvas,sx,sy);
  ctx.save();ctx.translate(sx,sy);

  // Time-slow ring
  if(M.tslow){
    ctx.globalAlpha=.07;ctx.strokeStyle='#00ffee';ctx.lineWidth=2;
    ctx.setLineDash([6,8]);
    ctx.beginPath();ctx.arc(P.x,P.y,160,0,TAU);ctx.stroke();
    ctx.setLineDash([]);ctx.globalAlpha=1;
  }

  // Ball trail
  const invFlash=invCD>0&&Math.floor(invCD/7)%2===0;
  if(!invFlash){
    const steps=Math.min(trLen,16);
    for(let i=0;i<steps;i++){
      const idx=(trHead-1-i+TM)%TM;
      ctx.globalAlpha=(1-i/steps)*0.2;
      ctx.fillStyle=M.lts?'#ff8800':'#00ffee';
      ctx.beginPath();ctx.arc(trX[idx],trY[idx],P.r*(1-i/steps*.5),0,TAU);ctx.fill();
    }
    ctx.globalAlpha=1;
  }

  // Bullets
  for(let i=0;i<BMAX;i++){
    if(!bAct[i])continue;
    const x=bX[i]|0,y=bY[i]|0,r=bR[i];
    const col=BCOLS[bCol[i]];
    ctx.fillStyle=col;
    if(bType[i]===0){
      ctx.beginPath();ctx.arc(x,y,r,0,TAU);ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x,y,r*.42,0,TAU);ctx.fill();
    } else if(bType[i]===1){
      const s=(r*1.4)|0;
      ctx.fillRect(x-s,y-s,s*2,s*2);
      ctx.fillStyle='#fff';ctx.fillRect(x-s/2|0,y-s/2|0,s,s);
    } else {
      ctx.save();ctx.translate(x,y);ctx.rotate(Math.PI/4);
      const s=(r*1.4)|0;
      ctx.fillRect(-s,-s,s*2,s*2);
      ctx.fillStyle='#fff';ctx.fillRect(-s/2|0,-s/2|0,s,s);
      ctx.restore();
    }
  }

  // Particles
  for(let i=0;i<PMAX;i++){
    if(pL[i]<=0)continue;
    ctx.globalAlpha=pL[i]*pL[i];
    ctx.fillStyle=BCOLS[pC[i]];
    const s=Math.max(1,(pS[i]*pL[i])|0);
    ctx.fillRect(pX[i]|0,pY[i]|0,s,s);
  }
  ctx.globalAlpha=1;

  // Shield
  if(!invFlash&&shield){
    const pulse=.5+.5*Math.sin(frame*.1);
    ctx.globalAlpha=.4+.15*pulse;ctx.strokeStyle='#8844ff';ctx.lineWidth=4;
    ctx.beginPath();ctx.arc(P.x,P.y,P.r+14,0,TAU);ctx.stroke();
    ctx.lineWidth=2;ctx.globalAlpha=.15+.1*pulse;
    ctx.beginPath();ctx.arc(P.x,P.y,P.r+22,0,TAU);ctx.stroke();
    ctx.globalAlpha=1;
  }

  // Player ball
  if(!invFlash){
    const col=M.lts?'#ff8800':'#00ffee';
    const alpha=ghostTimer>0?.38:1;
    const px2=P.x|0,py2=P.y|0,r=P.r;
    ctx.globalAlpha=alpha;
    // outer ball
    ctx.fillStyle=col;ctx.beginPath();ctx.arc(px2,py2,r,0,TAU);ctx.fill();
    // bright ring
    ctx.fillStyle='rgba(255,255,255,.35)';ctx.beginPath();ctx.arc(px2,py2,r*.72,0,TAU);ctx.fill();
    // core
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(px2,py2,r*.42,0,TAU);ctx.fill();
    // tiny center
    ctx.fillStyle=col;ctx.beginPath();ctx.arc(px2,py2,r*.18,0,TAU);ctx.fill();
    // pixel glint top-left
    ctx.fillStyle='rgba(255,255,255,.7)';ctx.fillRect(px2-r*.35|0,py2-r*.35|0,4,4);
    ctx.globalAlpha=1;
  }

  // Float texts
  ctx.textAlign='center';ctx.font='9px "Press Start 2P"';
  for(const f of floats){ctx.globalAlpha=f.l*f.l;ctx.fillStyle=f.c;ctx.fillText(f.t,f.x,f.y);}
  ctx.globalAlpha=1;

  // Low-life vignette
  if(hp===1){
    const p=.07+.06*Math.sin(frame*.08);
    const vg=ctx.createRadialGradient(W/2,H/2,H*.22,W/2,H/2,H);
    vg.addColorStop(0,'transparent');vg.addColorStop(1,`rgba(255,34,68,${p})`);
    ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
  }

  ctx.restore();
}

function mainLoop(ts){
  requestAnimationFrame(mainLoop);
  const dt=Math.min(ts-lastT,100);lastT=ts;
  if(state==='menu'){
    ctx.drawImage(bgCanvas,0,0);
    return;
  }
  if(state==='dead'){ctx.drawImage(bgCanvas,0,0);return;}
  accum+=dt;
  while(accum>=STEP){tick();accum-=STEP;}
  render();
}

// ── SKILL TREE ────────────────────────────────────────────────
const sto=document.getElementById('sto');
const stc=document.getElementById('stc');
const sc=stc.getContext('2d');
let stW=0,stH=0,stPX=0,stPY=0,stDrag=false,stLX=0,stLY=0,stSel=null,stRaf=null,stF=0;

function openST(){
  sto.style.display='flex';
  requestAnimationFrame(()=>{
    stW=stc.width=stc.offsetWidth;stH=stc.height=stc.offsetHeight;
    stPX=stW*.5-1400;stPY=stH*.5-900;
    updSP();stSel=null;updNP();
    stRaf=requestAnimationFrame(renderST);
  });
}
function closeST(){sto.style.display='none';if(stRaf){cancelAnimationFrame(stRaf);stRaf=null;}}

stc.addEventListener('pointerdown',e=>{
  stDrag=true;stLX=e.clientX;stLY=e.clientY;stc.setPointerCapture(e.pointerId);
  const vx=e.clientX-stPX,vy=e.clientY-stPY;
  let best=null,bd=9999;
  for(const sk of SKILLS){const d=Math.hypot(vx-sk.vx,vy-sk.vy);if(d<68&&d<bd){bd=d;best=sk;}}
  if(best){stSel=best;updNP();}
});
stc.addEventListener('pointermove',e=>{if(!stDrag)return;stPX+=e.clientX-stLX;stPY+=e.clientY-stLY;stLX=e.clientX;stLY=e.clientY;});
stc.addEventListener('pointerup',()=>stDrag=false);

function isAvail(sk){return sk.cost===0||sk.req.every(r=>unlocked.has(r));}
function updNP(){
  const np=document.getElementById('np');
  if(!stSel){np.style.display='none';return;}
  np.style.display='flex';
  const sk=stSel,own=unlocked.has(sk.id),av=isAvail(sk),af=spBank>=sk.cost;
  document.getElementById('np-name').textContent=sk.name;
  document.getElementById('np-name').style.color=BC[sk.b]||'#fff';
  document.getElementById('np-desc').textContent=sk.desc;
  document.getElementById('np-cost').textContent=sk.cost===0?'FREE':'COST: '+sk.cost+' SP  |  BANK: '+spBank+' SP';
  const btn=document.getElementById('np-buy');
  if(own){btn.textContent='✓ UNLOCKED';btn.className='owned';btn.disabled=true;}
  else if(!av){btn.textContent='LOCKED';btn.className='';btn.disabled=true;}
  else if(!af){btn.textContent='NEED '+sk.cost+' SP';btn.className='';btn.disabled=true;}
  else{btn.textContent='UNLOCK ('+sk.cost+' SP)';btn.className='';btn.disabled=false;}
}
function buySelected(){
  if(!stSel)return;const sk=stSel;
  if(unlocked.has(sk.id)||!isAvail(sk)||spBank<sk.cost)return;
  spBank-=sk.cost;unlocked.add(sk.id);recalc();doSave();updSP();updNP();
}

function h2rgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}

function renderST(){
  stRaf=requestAnimationFrame(renderST);stF++;
  sc.fillStyle='#04060e';sc.fillRect(0,0,stW,stH);
  const gs=40;
  sc.fillStyle='rgba(0,120,80,.03)';
  for(let x=((stPX%gs)+gs)%gs;x<stW;x+=gs)sc.fillRect(x,0,1,stH);
  for(let y=((stPY%gs)+gs)%gs;y<stH;y+=gs)sc.fillRect(0,y,stW,1);
  sc.save();sc.translate(stPX,stPY);

  // Connections
  for(const sk of SKILLS){
    for(const rid of sk.req){
      const rs=SKMAP[rid];if(!rs)continue;
      const own=unlocked.has(sk.id)&&unlocked.has(rid);
      const half=!unlocked.has(sk.id)&&unlocked.has(rid);
      sc.save();
      if(own){sc.strokeStyle=BC[sk.b];sc.lineWidth=4;sc.globalAlpha=.8;}
      else if(half){sc.strokeStyle=BC[sk.b];sc.lineWidth=2;sc.globalAlpha=.28;sc.setLineDash([7,6]);}
      else{sc.strokeStyle='#1a2030';sc.lineWidth=1;sc.globalAlpha=.18;sc.setLineDash([4,9]);}
      const mx=(rs.vx+sk.vx)/2;
      sc.beginPath();sc.moveTo(rs.vx,rs.vy);sc.lineTo(mx,rs.vy);sc.lineTo(mx,sk.vy);sc.lineTo(sk.vx,sk.vy);
      sc.stroke();sc.restore();
    }
  }
  for(const sk of SKILLS)drawNode(sk);
  sc.restore();

  // Labels
  const labs=[{x:10,y:18,t:'⚡ MOBILITY',c:BC.move},{x:stW*.25,y:18,t:'🛡 DEFENSE',c:BC.def},{x:stW*.57,y:18,t:'💥 POWER',c:BC.pwr},{x:stW*.4,y:stH-8,t:'✦ FORTUNE',c:BC.luck}];
  sc.font='9px "Press Start 2P"';sc.globalAlpha=.32;
  for(const l of labs){sc.fillStyle=l.c;sc.textAlign='left';sc.fillText(l.t,l.x,l.y);}
  sc.globalAlpha=1;

  // Minimap
  const mx=stW-108,my=8,mw=100,mh=68;
  sc.fillStyle='rgba(0,0,0,.5)';sc.fillRect(mx,my,mw,mh);
  sc.strokeStyle='#ffffff11';sc.lineWidth=1;sc.strokeRect(mx,my,mw,mh);
  for(const sk of SKILLS){
    const dx=mx+(sk.vx/2750)*mw,dy=my+(sk.vy/1900)*mh;
    sc.fillStyle=unlocked.has(sk.id)?BC[sk.b]:'#2a3a44';
    const ds=unlocked.has(sk.id)?4:2;
    sc.fillRect(dx-ds/2,dy-ds/2,ds,ds);
  }
  const vl=mx+(-stPX/2750)*mw,vt=my+(-stPY/1900)*mh;
  sc.strokeStyle='#ffffff33';sc.lineWidth=1;sc.strokeRect(vl,vt,(stW/2750)*mw,(stH/1900)*mh);
}

function drawNode(sk){
  const own=unlocked.has(sk.id),av=isAvail(sk)&&!own,sel=stSel&&stSel.id===sk.id;
  const col=BC[sk.b]||'#fff';
  const NW=130,NH=70;
  const x=sk.vx-NW/2,y=sk.vy-NH/2;
  const [cr,cg,cb]=h2rgb(col);
  const pulse=.5+.5*Math.sin(stF*.08+sk.vx*.003);
  sc.globalAlpha=own?1:av?.82:.26;
  sc.fillStyle=own?`rgba(${cr},${cg},${cb},.18)`:av?`rgba(${cr},${cg},${cb},.07)`:'rgba(5,9,18,.92)';
  sc.fillRect(x,y,NW,NH);
  const bw=3;
  sc.fillStyle=own?col:av?(sel?'#fff':col+'aa'):'#152030';
  sc.fillRect(x,y,NW,bw);sc.fillRect(x,y+NH-bw,NW,bw);sc.fillRect(x,y,bw,NH);sc.fillRect(x+NW-bw,y,bw,NH);
  if(sel){sc.globalAlpha=.5;sc.fillStyle='#fff';sc.fillRect(x-4,y-4,NW+8,2);sc.fillRect(x-4,y+NH+2,NW+8,2);sc.fillRect(x-4,y-4,2,NH+8);sc.fillRect(x+NW+2,y-4,2,NH+8);}
  sc.globalAlpha=own?1:av?.82:.26;
  sc.fillStyle=col;for(let t=0;t<sk.t;t++)sc.fillRect(x+5+t*9,y+5,6,6);
  if(own){sc.font='10px "Press Start 2P"';sc.fillStyle=col;sc.textAlign='right';sc.fillText('✓',x+NW-5,y+17);}
  const words=sk.name.split(' ');
  sc.font='8px "Press Start 2P"';sc.fillStyle=own?col:av?'#eef':'#445566';sc.textAlign='center';
  if(sk.name.length<=12){sc.fillText(sk.name,sk.vx,sk.vy+4);}
  else{const m=Math.ceil(words.length/2);sc.fillText(words.slice(0,m).join(' '),sk.vx,sk.vy-4);sc.fillText(words.slice(m).join(' '),sk.vx,sk.vy+10);}
  sc.font='7px "Press Start 2P"';sc.fillStyle=sk.cost===0?'#445':own?'#223':spBank>=sk.cost?'#ffcc00':'#664400';
  sc.fillText(sk.cost===0?'FREE':sk.cost+' SP',sk.vx,y+NH-8);
  sc.globalAlpha=1;
}

// ── BOOT ─────────────────────────────────────────────────────
loadSave();recalc();showMenu();
requestAnimationFrame(mainLoop);
</script>
