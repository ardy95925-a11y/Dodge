<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DODGE — Gunfire Evasion</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }

  :root {
    --bg: #050810;
    --red: #ff2244;
    --orange: #ff6622;
    --yellow: #ffcc00;
    --cyan: #00ffee;
    --white: #f0f0f0;
    --dim: rgba(255,255,255,0.08);
  }

  body {
    background: var(--bg);
    width: 100vw; height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    color: var(--white);
    user-select: none;
    -webkit-user-select: none;
  }

  canvas {
    display: block;
    background: var(--bg);
    border: 1px solid rgba(0,255,238,0.15);
    box-shadow: 0 0 60px rgba(0,255,238,0.08), inset 0 0 80px rgba(0,0,0,0.6);
    border-radius: 4px;
    touch-action: none;
  }

  #hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 18px 28px;
    pointer-events: none;
    z-index: 10;
  }

  .hud-block { display: flex; flex-direction: column; gap: 2px; }
  .hud-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
  }
  .hud-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 2px;
    color: var(--cyan);
    text-shadow: 0 0 20px var(--cyan);
    line-height: 1;
  }
  .hud-lives { display: flex; gap: 6px; align-items: center; margin-top: 4px; }
  .life-pip {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--red);
    box-shadow: 0 0 8px var(--red);
    transition: opacity 0.3s;
  }
  .life-pip.dead { background: #333; box-shadow: none; opacity: 0.3; }

  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    background: rgba(5,8,16,0.88);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  #overlay.hidden { display: none; }

  .overlay-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(64px, 12vw, 120px);
    letter-spacing: 8px;
    color: var(--red);
    text-shadow: 0 0 40px var(--red), 0 0 80px rgba(255,34,68,0.4);
    line-height: 1;
    animation: pulse 1.8s ease-in-out infinite;
  }
  .overlay-sub {
    font-size: clamp(11px, 2vw, 14px);
    letter-spacing: 5px;
    color: rgba(255,255,255,0.4);
    margin-top: 10px;
    text-transform: uppercase;
  }
  .overlay-score-label {
    font-size: 12px; letter-spacing: 4px;
    color: rgba(255,255,255,0.3);
    margin-top: 48px;
    text-transform: uppercase;
  }
  .overlay-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 9vw, 80px);
    color: var(--cyan);
    text-shadow: 0 0 30px var(--cyan);
    letter-spacing: 4px;
    line-height: 1.1;
  }
  .overlay-high {
    font-size: 12px; letter-spacing: 3px;
    color: var(--yellow);
    text-shadow: 0 0 12px var(--yellow);
    margin-top: 6px;
    text-transform: uppercase;
  }
  .start-btn {
    margin-top: 40px;
    padding: 16px 52px;
    background: transparent;
    border: 2px solid var(--cyan);
    color: var(--cyan);
    font-family: 'Share Tech Mono', monospace;
    font-size: 16px;
    letter-spacing: 6px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    box-shadow: 0 0 20px rgba(0,255,238,0.2), inset 0 0 20px rgba(0,255,238,0.05);
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .start-btn:active {
    background: rgba(0,255,238,0.1);
    box-shadow: 0 0 40px rgba(0,255,238,0.4), inset 0 0 30px rgba(0,255,238,0.1);
    transform: scale(0.97);
  }

  .pencil-hint {
    position: absolute;
    bottom: 28px;
    font-size: 11px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
  }

  @keyframes pulse {
    0%, 100% { text-shadow: 0 0 40px var(--red), 0 0 80px rgba(255,34,68,0.4); }
    50% { text-shadow: 0 0 60px var(--red), 0 0 120px rgba(255,34,68,0.6); }
  }
</style>
</head>
<body>

<div id="hud">
  <div class="hud-block">
    <div class="hud-label">Score</div>
    <div class="hud-value" id="scoreDisplay">0</div>
  </div>
  <div class="hud-block" style="align-items:center">
    <div class="hud-label" style="text-align:center">Lives</div>
    <div class="hud-lives" id="livesDisplay">
      <div class="life-pip" id="pip0"></div>
      <div class="life-pip" id="pip1"></div>
      <div class="life-pip" id="pip2"></div>
    </div>
  </div>
  <div class="hud-block" style="align-items:flex-end">
    <div class="hud-label">Wave</div>
    <div class="hud-value" id="waveDisplay">1</div>
  </div>
</div>

<canvas id="c"></canvas>

<div id="overlay">
  <div class="overlay-title" id="overlayTitle">DODGE</div>
  <div class="overlay-sub" id="overlaySub">Gunfire Evasion</div>
  <div class="overlay-score-label" id="scoreLabel" style="display:none">Your Score</div>
  <div class="overlay-score" id="overlayScore" style="display:none">0</div>
  <div class="overlay-high" id="overlayHigh" style="display:none"></div>
  <button class="start-btn" id="startBtn">TAP TO BEGIN</button>
  <div class="pencil-hint">Use finger or Apple Pencil to dodge</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');
const scoreDisplay = document.getElementById('scoreDisplay');
const waveDisplay = document.getElementById('waveDisplay');
const overlayTitle = document.getElementById('overlayTitle');
const overlaySub = document.getElementById('overlaySub');
const scoreLabel = document.getElementById('scoreLabel');
const overlayScore = document.getElementById('overlayScore');
const overlayHigh = document.getElementById('overlayHigh');
const pips = [document.getElementById('pip0'), document.getElementById('pip1'), document.getElementById('pip2')];

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── Game State ──────────────────────────────────────────────
let state = 'menu'; // menu | playing | dead
let score = 0;
let highScore = 0;
let lives = 3;
let wave = 1;
let frameCount = 0;
let hitCooldown = 0;
let shakeAmt = 0;

// ── Player ──────────────────────────────────────────────────
const player = {
  x: 0, y: 0,
  tx: 0, ty: 0,   // target (from touch)
  r: 18,
  trail: [],
  active: false,
};

// ── Bullets ─────────────────────────────────────────────────
let bullets = [];
let particles = [];
let muzzleFlashes = [];

function spawnBullet() {
  const side = Math.floor(Math.random() * 4); // 0=left,1=right,2=top,3=bottom
  let x, y, vx, vy, angle;
  const speed = 5 + wave * 0.8 + Math.random() * 3;
  const spread = 0.3; // radians spread

  // aim roughly at player with some spread
  let ax = player.x, ay = player.y;

  if (side === 0) { x = -20; y = Math.random() * H; }
  else if (side === 1) { x = W + 20; y = Math.random() * H; }
  else if (side === 2) { x = Math.random() * W; y = -20; }
  else { x = Math.random() * W; y = H + 20; }

  angle = Math.atan2(ay - y, ax - x) + (Math.random() - 0.5) * spread;
  vx = Math.cos(angle) * speed;
  vy = Math.sin(angle) * speed;

  // muzzle flash
  muzzleFlashes.push({ x, y, r: 30, life: 1, color: `hsl(${20 + Math.random()*40},100%,70%)` });

  const hue = Math.random() < 0.6 ? Math.random() * 40 + 10 : Math.random() * 360;
  bullets.push({
    x, y, vx, vy,
    r: 5 + Math.random() * 3,
    color: `hsl(${hue},100%,60%)`,
    trail: [],
    spin: 0,
    spinSpeed: (Math.random() - 0.5) * 0.4,
    life: 1,
  });
}

function spawnParticles(x, y, color, count = 12) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 6;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      r: 1 + Math.random() * 4,
      color,
      life: 1,
      decay: 0.02 + Math.random() * 0.04,
    });
  }
}

// ── Input ────────────────────────────────────────────────────
let touching = false;
canvas.addEventListener('pointerdown', e => {
  if (state !== 'playing') return;
  touching = true;
  player.tx = e.clientX;
  player.ty = e.clientY;
  player.active = true;
});
canvas.addEventListener('pointermove', e => {
  if (!touching || state !== 'playing') return;
  player.tx = e.clientX;
  player.ty = e.clientY;
});
canvas.addEventListener('pointerup', () => { touching = false; });
canvas.addEventListener('pointercancel', () => { touching = false; });

startBtn.addEventListener('click', startGame);
startBtn.addEventListener('touchend', e => { e.preventDefault(); startGame(); });

function startGame() {
  score = 0;
  lives = 3;
  wave = 1;
  frameCount = 0;
  bullets = [];
  particles = [];
  muzzleFlashes = [];
  hitCooldown = 0;
  shakeAmt = 0;
  player.x = W / 2;
  player.y = H / 2;
  player.tx = W / 2;
  player.ty = H / 2;
  player.trail = [];
  player.active = false;
  touching = false;

  updateLivesDisplay();
  scoreDisplay.textContent = '0';
  waveDisplay.textContent = '1';

  state = 'playing';
  overlay.classList.add('hidden');
  requestAnimationFrame(loop);
}

function gameOver() {
  state = 'dead';
  if (score > highScore) highScore = score;

  overlayTitle.textContent = 'YOU DIED';
  overlaySub.textContent = 'Better luck next time';
  scoreLabel.style.display = 'block';
  overlayScore.style.display = 'block';
  overlayScore.textContent = score;
  overlayHigh.style.display = 'block';
  overlayHigh.textContent = `Best: ${highScore}`;
  startBtn.textContent = 'TRY AGAIN';
  overlay.classList.remove('hidden');
}

function updateLivesDisplay() {
  pips.forEach((p, i) => {
    p.classList.toggle('dead', i >= lives);
  });
}

// ── Background grid ──────────────────────────────────────────
function drawGrid() {
  ctx.save();
  ctx.strokeStyle = 'rgba(0,255,238,0.04)';
  ctx.lineWidth = 1;
  const gs = 60;
  for (let x = 0; x < W; x += gs) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += gs) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  ctx.restore();
}

// ── Render ───────────────────────────────────────────────────
function drawPlayer() {
  const { x, y, r, trail } = player;
  const inv = hitCooldown > 0 && Math.floor(hitCooldown / 6) % 2 === 0;
  if (inv) return;

  // trail
  for (let i = 0; i < trail.length; i++) {
    const t = trail[i];
    const alpha = (i / trail.length) * 0.4;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.arc(t.x, t.y, r * (i / trail.length), 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,255,238,0.5)';
    ctx.fill();
    ctx.restore();
  }

  // glow
  const grad = ctx.createRadialGradient(x, y, 0, x, y, r * 3);
  grad.addColorStop(0, 'rgba(0,255,238,0.25)');
  grad.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.arc(x, y, r * 3, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();

  // body
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = '#00ffee';
  ctx.shadowColor = '#00ffee';
  ctx.shadowBlur = 20;
  ctx.fill();
  ctx.shadowBlur = 0;

  // inner dot
  ctx.beginPath();
  ctx.arc(x, y, r * 0.35, 0, Math.PI * 2);
  ctx.fillStyle = '#050810';
  ctx.fill();

  // crosshair ring
  ctx.beginPath();
  ctx.arc(x, y, r + 6, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(0,255,238,0.4)';
  ctx.lineWidth = 1;
  ctx.stroke();
}

function drawBullet(b) {
  // trail
  for (let i = 0; i < b.trail.length; i++) {
    const t = b.trail[i];
    const frac = i / b.trail.length;
    ctx.save();
    ctx.globalAlpha = frac * 0.5;
    ctx.beginPath();
    ctx.arc(t.x, t.y, b.r * frac * 0.8, 0, Math.PI * 2);
    ctx.fillStyle = b.color;
    ctx.fill();
    ctx.restore();
  }
  // glow
  ctx.save();
  ctx.shadowColor = b.color;
  ctx.shadowBlur = 15;
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
  ctx.fillStyle = b.color;
  ctx.fill();
  // bright core
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.r * 0.4, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawMuzzleFlash(f) {
  ctx.save();
  ctx.globalAlpha = f.life * 0.8;
  const grad = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, f.r);
  grad.addColorStop(0, '#fff');
  grad.addColorStop(0.3, f.color);
  grad.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.restore();
}

function drawParticle(p) {
  ctx.save();
  ctx.globalAlpha = p.life;
  ctx.beginPath();
  ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
  ctx.fillStyle = p.color;
  ctx.shadowColor = p.color;
  ctx.shadowBlur = 8;
  ctx.fill();
  ctx.restore();
}

// ── Main Loop ────────────────────────────────────────────────
function loop() {
  if (state !== 'playing') return;

  frameCount++;
  const waveSpeed = 1 + (wave - 1) * 0.15;

  // spawn bullets
  const spawnRate = Math.max(15, 60 - wave * 5);
  if (frameCount % Math.floor(spawnRate) === 0) spawnBullet();
  // occasional burst
  if (frameCount % 180 === 0 && wave >= 2) {
    for (let i = 0; i < 3; i++) setTimeout(spawnBullet, i * 80);
  }

  // wave up every 10 seconds
  if (frameCount % 600 === 0) {
    wave++;
    waveDisplay.textContent = wave;
  }

  // score
  if (frameCount % 30 === 0) {
    score += wave;
    scoreDisplay.textContent = score;
  }

  // camera shake
  let sx = 0, sy = 0;
  if (shakeAmt > 0) {
    sx = (Math.random() - 0.5) * shakeAmt;
    sy = (Math.random() - 0.5) * shakeAmt;
    shakeAmt *= 0.85;
    if (shakeAmt < 0.5) shakeAmt = 0;
  }

  // clear
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.translate(sx, sy);

  drawGrid();

  // update & draw muzzle flashes
  muzzleFlashes = muzzleFlashes.filter(f => { f.life -= 0.15; return f.life > 0; });
  muzzleFlashes.forEach(drawMuzzleFlash);

  // update player
  const dx = player.tx - player.x;
  const dy = player.ty - player.y;
  const lerp = player.active ? 0.18 : 0.08;
  player.x += dx * lerp;
  player.y += dy * lerp;

  player.trail.push({ x: player.x, y: player.y });
  if (player.trail.length > 16) player.trail.shift();

  // update bullets
  if (hitCooldown > 0) hitCooldown--;

  bullets = bullets.filter(b => {
    b.trail.push({ x: b.x, y: b.y });
    if (b.trail.length > 12) b.trail.shift();
    b.x += b.vx;
    b.y += b.vy;
    b.spin += b.spinSpeed;

    // off screen
    if (b.x < -60 || b.x > W + 60 || b.y < -60 || b.y > H + 60) return false;

    // collision
    if (hitCooldown === 0) {
      const dist = Math.hypot(player.x - b.x, player.y - b.y);
      if (dist < player.r + b.r - 6) {
        // hit!
        spawnParticles(b.x, b.y, b.color, 20);
        spawnParticles(player.x, player.y, '#00ffee', 14);
        shakeAmt = 18;
        hitCooldown = 90;
        lives--;
        updateLivesDisplay();
        if (lives <= 0) {
          ctx.restore();
          gameOver();
          return false;
        }
        return false;
      }
    }

    drawBullet(b);
    return true;
  });

  // update particles
  particles = particles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.94;
    p.vy *= 0.94;
    p.life -= p.decay;
    if (p.life <= 0) return false;
    drawParticle(p);
    return true;
  });

  drawPlayer();

  // danger vignette when low lives
  if (lives === 1) {
    const pulse = 0.15 + 0.1 * Math.sin(frameCount * 0.1);
    const vg = ctx.createRadialGradient(W/2, H/2, H*0.3, W/2, H/2, H*0.85);
    vg.addColorStop(0, 'transparent');
    vg.addColorStop(1, `rgba(255,34,68,${pulse})`);
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, W, H);
  }

  ctx.restore();
  requestAnimationFrame(loop);
}

// init display
overlay.classList.remove('hidden');
</script>
</body>
</html>
